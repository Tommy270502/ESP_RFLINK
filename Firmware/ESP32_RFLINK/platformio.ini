[platformio]
default_envs = node1

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_build.partitions = default.csv
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    nrf24/RF24
    bblanchon/ArduinoJson
    links2004/WebSockets

[env:node1]
build_flags =
    ${env.build_flags}
    -DDEVICE_ROLE=\"node1\"
    -DRF_DEFAULT_RX_ADDR=\"NODE1\"
    -DRF_DEFAULT_TX_ADDR=\"NODE2\"
    -DWIFI_AP_SSID=\"WirelessDev-Node1\"

[env:node2]
build_flags =
    ${env.build_flags}
    -DDEVICE_ROLE=\"node2\"
    -DRF_DEFAULT_RX_ADDR=\"NODE2\"
    -DRF_DEFAULT_TX_ADDR=\"NODE1\"
    -DWIFI_AP_SSID=\"WirelessDev-Node2\"
